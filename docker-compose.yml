version: '3.8'

services:
  # ── TimescaleDB (drop-in Postgres replacement, fully compatible with existing schema) ──
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Error: POSTGRES_PASSWORD must be explicitly provided in the environment}
      POSTGRES_DB: ${POSTGRES_DB:-market_surveillance}
    ports:
      - "5432:5432"          # Standard port for local tooling
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # ── Redis Streams (ingestion queue for live ticks) ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── FastAPI application (unchanged) ──
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Error: POSTGRES_PASSWORD must be explicitly provided in the environment}
      - POSTGRES_DB=${POSTGRES_DB:-market_surveillance}
      - POSTGRES_HOST=db
      - SECRET_KEY=dev_secret_key_change_me
      - MODEL_DIR=/app/trained_models
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ── ML Engine (consumes trades, scores anomalies) ──
  engine:
    build: ./backend
    command: python scripts/run_engine.py
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Error: POSTGRES_PASSWORD must be explicitly provided in the environment}
      - POSTGRES_DB=${POSTGRES_DB:-market_surveillance}
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - MODEL_DIR=/app/trained_models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ── Market Adapters (ingest trades into Redis) ──
  crypto_worker:
    build: ./backend
    command: python scripts/market_adapters/crypto_worker.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      # - BINANCE_API_KEY=your_key
      # - BINANCE_API_SECRET=your_secret
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  us_worker:
    build: ./backend
    command: python scripts/market_adapters/us_worker.py
    environment:
      - REDIS_URL=redis://redis:6379/0
      # - ALPACA_API_KEY=your_key
      # - ALPACA_API_SECRET=your_secret
      # - FINNHUB_API_KEY=your_key
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

volumes:
  postgres_data:
