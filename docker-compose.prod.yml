version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: always

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: always
    depends_on:
      - redis
      - db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    command: redis-server --appendonly yes

  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: market_surveillance
    ports:
      - "5432:5432"
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    restart: always

  ml_engine:
    build: .
    env_file:
      - .env.prod
    command: python scripts/run_engine.py
    restart: always
    depends_on:
      - redis
      - db

  crypto_worker:
    build: .
    env_file:
      - .env.prod
    command: python -m scripts.market_adapters.crypto_worker
    restart: always
    depends_on:
      - redis

  sentiment_worker:
    build: .
    env_file:
      - .env.prod
    command: python -m scripts.market_adapters.sentiment_worker
    restart: always
    depends_on:
      - redis

volumes:
  prod_postgres_data:
